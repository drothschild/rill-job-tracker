services:
  tracker:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - /share/CACHEDEV1_DATA/documents/job-tracker/data:/data
    environment:
      - DB_PATH=/data/tracker.db
      - PORT=3000
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
    restart: unless-stopped
